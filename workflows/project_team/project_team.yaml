workflow_id: project-team
main_role: coordinator

phases:
  - id: vision
    file: vision
    advance_checks:
      - type: manual-confirm
        prompt: "Vision approved by user?"
  - id: setup
    file: setup
    advance_checks:
      - type: command-output-check
        command: "ls .project_team/*/STATUS.md 2>/dev/null"
        pattern: "STATUS\\.md"
      - type: command-output-check
        command: "ls .project_team/*/userprompt.md 2>/dev/null"
        pattern: "userprompt\\.md"
  - id: leadership
    file: leadership
  - id: specification
    file: specification
    advance_checks:
      - type: command-output-check
        command: "ls .project_team/*/specification/SPECIFICATION.md 2>/dev/null"
        pattern: "SPECIFICATION\\.md"
      - type: manual-confirm
        prompt: "Specification approved by user?"
    hints:
      - message: "Synthesize all Leadership findings before presenting to user"
        lifecycle: show-once
  - id: implementation
    file: implementation
    advance_checks:
      - type: manual-confirm
        prompt: "All Leadership agents approve implementation?"
  - id: testing
    file: testing
    advance_checks:
      - type: manual-confirm
        prompt: "All tests passing?"
      - type: manual-confirm
        prompt: "Ready to proceed to sign-off?"
  - id: signoff
    file: signoff

rules:
  - id: no_direct_code_coordinator
    trigger: PreToolUse/Write
    enforcement: warn
    message: "Coordinator should delegate code writing to Implementer agents"
    roles: [coordinator]

  - id: no_push_before_testing
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push"
    message: "No pushing before testing phase"
    exclude_phases: [testing, signoff]

  - id: no_force_push
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push\\s.*(--force-with-lease|--force\\b|-f\\b)"
    message: "Force push is never allowed"
