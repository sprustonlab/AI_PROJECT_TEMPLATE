# =============================================================================
# CI Workflow - Windows E2E Tests
# =============================================================================
# Runs end-to-end tests on Windows using both PowerShell 5.1 and 7.x.
#
# Tests:
#   1. Syntax validation of ALL .ps1 files (PS 5.1 + 7.x)
#   2. Activate script runs correctly (PS 5.1 + 7.x)
#   3. Python scripts work on Windows
#
# Platform notes:
#   - PowerShell 5.1 (shell: powershell) = Windows PowerShell, ships with Win10/11
#   - PowerShell 7.x (shell: pwsh) = PowerShell Core, cross-platform
#   - Both must pass. PS 5.1 is stricter (encoding, Join-Path, string parsing).
# =============================================================================

name: CI Windows

on:
  push:
    branches: [main, master, windows]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  test-windows:
    name: E2E Tests (Windows, ${{ matrix.shell }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        shell: [powershell, pwsh]  # 5.1 and 7.x

    env:
      # Force UTF-8 encoding for Python to handle emoji characters
      PYTHONIOENCODING: utf-8

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show PowerShell version
        run: |
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"
          Write-Host "Shell: ${{ matrix.shell }}"

      # -----------------------------------------------------------------------
      # Test 1: Syntax validation of ALL .ps1 files
      # -----------------------------------------------------------------------
      - name: Test 1 - Syntax validation of all .ps1 files
        run: |
          Write-Host "Validating syntax of all .ps1 files..."

          $allPs1 = Get-ChildItem -Path . -Filter "*.ps1" -Recurse -File |
            Where-Object { $_.FullName -notlike "*\submodules\*" -and $_.FullName -notlike "*\envs\*" }

          $failCount = 0
          foreach ($file in $allPs1) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$null,
              [ref]$errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $relativePath = $file.FullName.Substring((Get-Location).Path.Length + 1)
              Write-Host "FAIL $relativePath"
              foreach ($err in $errors) {
                Write-Host "  Line $($err.Extent.StartLineNumber): $($err.Message)"
              }
              $failCount++
            } else {
              $relativePath = $file.FullName.Substring((Get-Location).Path.Length + 1)
              Write-Host "  OK $relativePath"
            }
          }

          Write-Host ""
          Write-Host "Checked $($allPs1.Count) files, $failCount failed"

          if ($failCount -gt 0) {
            Write-Error "Syntax validation failed for $failCount file(s)"
            exit 1
          }

          Write-Host ""
          Write-Host "Test 1 PASSED: All .ps1 files have valid syntax (${{ matrix.shell }})"

      # -----------------------------------------------------------------------
      # Test 2: . .\activate.ps1 actually runs
      # -----------------------------------------------------------------------
      - name: Test 2 - Activate Script
        run: |
          Write-Host "Testing activate.ps1 with ${{ matrix.shell }}..."

          # Source the activate script
          . .\activate.ps1

          # Verify environment variables are set
          if (-not $env:PROJECT_ROOT) {
            Write-Error "PROJECT_ROOT not set"
            exit 1
          }
          Write-Host "  OK PROJECT_ROOT = $env:PROJECT_ROOT"

          if (-not $env:SLC_BASE) {
            Write-Error "SLC_BASE not set"
            exit 1
          }
          Write-Host "  OK SLC_BASE = $env:SLC_BASE"

          if (-not $env:SLC_PYTHON) {
            Write-Error "SLC_PYTHON not set"
            exit 1
          }
          Write-Host "  OK SLC_PYTHON = $env:SLC_PYTHON"

          # Verify SLCenv was created
          if (-not (Test-Path "envs\SLCenv")) {
            Write-Error "envs\SLCenv not created"
            exit 1
          }
          Write-Host "  OK envs\SLCenv exists"

          # Verify conda is available
          $condaPath = Join-Path (Join-Path $env:SLC_BASE "envs\SLCenv") "Scripts\conda.exe"
          if (-not (Test-Path $condaPath)) {
            Write-Error "conda.exe not found at $condaPath"
            exit 1
          }
          Write-Host "  OK conda.exe exists"

          Write-Host ""
          Write-Host "Test 2 PASSED: activate.ps1 works correctly (${{ matrix.shell }})"
        timeout-minutes: 15  # Miniforge download can take time

      # -----------------------------------------------------------------------
      # Test 3: Python scripts work on Windows
      # -----------------------------------------------------------------------
      - name: Test 3 - Python Scripts
        run: |
          Write-Host "Testing Python scripts import correctly..."

          # Source activate first
          . .\activate.ps1

          # Test install_SLC.py can be imported
          python -c "import install_SLC; print('install_SLC.py: OK')"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "install_SLC.py import failed"
            exit 1
          }

          # Test helper functions from install_env.py
          python -c "import sys; sys.path.insert(0, '.'); exec(open('install_env.py', encoding='utf-8').read().split('# --- Preliminary Setup ---')[0]); print(f'Platform: {get_platform_subdir()}'); print(f'is_windows: {is_windows()}'); print('install_env.py helpers: OK')"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "install_env.py helper functions failed"
            exit 1
          }

          Write-Host ""
          Write-Host "Test 3 PASSED: Python scripts work on Windows (${{ matrix.shell }})"

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Test Summary
        if: always()
        run: |
          Write-Host ""
          Write-Host "Windows CI Tests completed (${{ matrix.shell }})"
