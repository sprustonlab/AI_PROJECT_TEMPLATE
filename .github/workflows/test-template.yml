# =============================================================================
# Unified Test Workflow
# =============================================================================
# CI runs pytest via pixi — all test logic lives in Python, not shell scripts.
#
# Jobs:
#   fast: Runs "pytest" (default = not slow) on 3 OSes (every push/PR)
#   slow: Runs "pytest -m ''" on 3 OSes (manual dispatch only)
# =============================================================================

name: Tests

on:
  pull_request:
    branches: [main, composable-onboarding]
  workflow_dispatch:
    inputs:
      run_slow:
        type: boolean
        default: true
        description: "Run slow E2E tests"

env:
  GIT_AUTHOR_NAME: "CI"
  GIT_AUTHOR_EMAIL: "ci@test.com"
  GIT_COMMITTER_NAME: "CI"
  GIT_COMMITTER_EMAIL: "ci@test.com"

jobs:
  # ─── Fast tests: run on every push ───────────────────────────
  fast:
    name: Fast Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          persist-credentials: true

      - name: Configure git credentials for submodule access
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper ""

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Run fast tests
        run: pixi run pytest -v --tb=short

  # ─── Slow tests: pixi install, network, E2E ─────────────────
  slow:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_slow
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          persist-credentials: true

      - name: Configure git credentials for submodule access
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper ""

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Run all tests (including slow)
        run: pixi run pytest -m "" -v --tb=short --timeout=300
        timeout-minutes: 10
