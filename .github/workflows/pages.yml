name: Deploy Docs

on:
  workflow_dispatch:  # manual trigger only

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Configure git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Build docs site
        run: pixi run zensical build

      - name: Run tests with coverage
        run: pixi run pytest --cov=submodules/claudechic/claudechic --cov-report=html:site/coverage --cov-report=term -n auto --dist loadscope -m 'not slow and not integration'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
