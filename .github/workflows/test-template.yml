# =============================================================================
# Unified Test Workflow
# =============================================================================
# CI runs pytest via pixi — all test logic lives in Python, not shell scripts.
#
# Jobs:
#   fast: Runs fast unit tests with xdist (every push/PR) — target <2 min
#   full: Runs ALL tests across 3 OSes (manual dispatch only)
#
# 3-Layer Timeout Strategy (full job):
#   Layer 1 (Job):  30 min  — hard ceiling, prevents runaway CI
#   Layer 2 (Step): 20 min  — catches hanging pytest process
#   Layer 3 (Test): 300s    — catches individual test hangs
# =============================================================================

name: Tests

on:
  pull_request:
    branches: [main, composable-onboarding]
  workflow_dispatch:
    inputs:
      run_full:
        type: boolean
        default: true
        description: "Run full test suite (all tiers)"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  GIT_AUTHOR_NAME: "CI"
  GIT_AUTHOR_EMAIL: "ci@test.com"
  GIT_COMMITTER_NAME: "CI"
  GIT_COMMITTER_EMAIL: "ci@test.com"

jobs:
  # ─── Fast tests: run on every push ───────────────────────────
  fast:
    name: Fast Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          persist-credentials: true

      - name: Configure git credentials for submodule access
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper ""

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Run fast tests
        run: >
          pixi run pytest
          -n auto --dist loadscope
          -m 'not slow and not integration'
          --junitxml=.test_results/ci_fast.xml
          --tb=short -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-results-${{ matrix.os }}
          path: .test_results/ci_fast.xml
          retention-days: 30

  # ─── Full tests: all tiers, 3 OSes, manual dispatch ─────────
  full:
    name: Full Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_full
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          persist-credentials: true

      - name: Configure git credentials for submodule access
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper ""

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true

      - name: Run full tests
        timeout-minutes: 20
        run: >
          pixi run pytest
          -n auto --dist loadscope
          -m ""
          --timeout=300
          --junitxml=.test_results/ci_full.xml
          --tb=short -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-results-${{ matrix.os }}
          path: .test_results/ci_full.xml
          retention-days: 30
