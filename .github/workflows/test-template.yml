# =============================================================================
# Unified Test Workflow
# =============================================================================
# CI runs pytest via pixi — all test logic lives in Python, not shell scripts.
#
# Jobs:
#   fast: Runs fast unit tests with xdist (every push/PR) — target <2 min
#   slow: Runs slow E2E tests (manual dispatch only)
# =============================================================================

name: Tests

on:
  pull_request:
    branches: [main, composable-onboarding]
  workflow_dispatch:
    inputs:
      run_slow:
        type: boolean
        default: true
        description: "Run slow E2E tests"

env:
  GIT_AUTHOR_NAME: "CI"
  GIT_AUTHOR_EMAIL: "ci@test.com"
  GIT_COMMITTER_NAME: "CI"
  GIT_COMMITTER_EMAIL: "ci@test.com"

jobs:
  # ─── Fast tests: run on every push ───────────────────────────
  fast:
    name: Fast Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          persist-credentials: true

      - name: Configure git credentials for submodule access
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper ""

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Run fast tests
        run: >
          pixi run pytest
          -n auto --dist loadscope
          -m 'not slow and not integration'
          --junitxml=.test_results/ci_fast.xml
          --tb=short -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-results-${{ matrix.os }}
          path: .test_results/ci_fast.xml
          retention-days: 30

  # ─── Slow tests: pixi install, network, E2E ─────────────────
  slow:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_slow
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          persist-credentials: true

      - name: Configure git credentials for submodule access
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper ""

      - uses: prefix-dev/setup-pixi@v0.8.8

      - name: Run slow tests
        run: >
          pixi run pytest
          -m 'slow or integration'
          --junitxml=.test_results/ci_slow.xml
          --tb=short -v --timeout=300
        timeout-minutes: 10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slow-results-${{ matrix.os }}
          path: .test_results/ci_slow.xml
          retention-days: 30
