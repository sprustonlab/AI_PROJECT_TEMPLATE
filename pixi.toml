[workspace]
name = "my-project"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

# ── Base (always present — claudechic is the foundation) ──────
[dependencies]
python = ">=3.10"
pip = "*"
pytest = ">=9.0.2,<10"
pyyaml = "*"

[pypi-dependencies]
claudechic = { path = "submodules/claudechic", editable = true }
copier = ">=9,<10"
pytest-asyncio = "*"
pytest-timeout = "*"
pytest-xdist = "*"
filelock = "*"
pexpect = "*"
ruff = "*"
pytest-cov = "*"
hypothesis = "*"
interrogate = "*"
pre-commit = "*"
pyright = "*"
mutmut = "*"
mkdocstrings-python = "*"
zensical = "==0.0.32"

# ── Optional environments (added by user or Copier) ───────────
[feature.jupyter.dependencies]
python = ">=3.10"
jupyterlab = "*"

# ── Pixi tasks ───────────────────────────────────────────────
[tasks]
claudechic = "claudechic"

[feature.jupyter.tasks]
jupyter = "jupyter lab"

# ── Environment mappings ──────────────────────────────────────
# Default env has claudechic (base). Named envs add optional features.
[environments]
jupyter = ["jupyter"]
