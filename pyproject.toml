[tool.pytest.ini_options]
pythonpath = [".", "scripts"]
testpaths = ["tests", "submodules/claudechic/tests"]
markers = [
    "slow: tests that take >30s (copier+pixi install, E2E, pexpect)",
    "integration: tests requiring external tools (copier, pixi) but <60s each",
    "copier: tests that run copier copy",
    "pixi: tests that require pixi installed",
    "network: tests requiring network access",
    "tui: Textual TUI tests using App.run_test()",
    "unix_only: tests that only work on Linux/macOS (pexpect)",
    "e2e: full end-to-end lifecycle tests",
]
strict_markers = true
# Default: skip slow AND integration tests locally — fast suite only
addopts = "-n auto --dist loadscope -m 'not slow and not integration'"
timeout = 30
filterwarnings = [
    "ignore::copier._vcs.DirtyLocalWarning",
]
