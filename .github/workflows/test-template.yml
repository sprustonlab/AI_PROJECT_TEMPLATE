# =============================================================================
# Unified Test Workflow
# =============================================================================
# CI runs pytest — all test logic lives in Python test files, not shell scripts.
#
# Jobs:
#   fast: Runs "pytest -m 'not slow'" on 3 OSes (every push/PR)
#   slow: Runs "pytest -m ''" on Linux/macOS (weekly / manual dispatch)
# =============================================================================

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      run_slow:
        type: boolean
        default: true
        description: "Run slow E2E tests"

env:
  GIT_AUTHOR_NAME: "CI"
  GIT_AUTHOR_EMAIL: "ci@test.com"
  GIT_COMMITTER_NAME: "CI"
  GIT_COMMITTER_EMAIL: "ci@test.com"

jobs:
  # ─── Fast tests: run on every push ───────────────────────────
  fast:
    name: Fast Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml copier pytest-asyncio pytest-timeout

      - name: Run fast tests
        run: python -m pytest -v --tb=short

  # ─── Slow tests: pixi install, network, E2E ─────────────────
  slow:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fast
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_slow)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          run-install: false

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml copier pytest-asyncio pytest-timeout pexpect

      - name: Run all tests (including slow)
        run: python -m pytest -m "" -v --tb=short --timeout=300
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.1"
        timeout-minutes: 10
