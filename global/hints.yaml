- id: welcome
  message: "Welcome! Run /tutorial to start the Workflow Guidance System tutorial."
  lifecycle: show-once

- id: workflow_list_tip
  message: "Tip: Use /workflow list to see available workflows."
  lifecycle: show-once

# --- Slash command discovery hints ---

- id: tip_worktree
  message: "Tip: Use /worktree <name> to create a git worktree with its own agent for parallel development. Use /worktree finish to merge back, /worktree discard to throw it away."
  lifecycle: show-once

- id: tip_chicsession
  message: "Tip: Use /chicsession save <name> to snapshot your multi-agent session, and /chicsession restore <name> to resume it later."
  lifecycle: show-once

- id: tip_compactish
  message: "Tip: Use /compactish to shrink your context when the session feels slow. Add -n for a dry run."
  lifecycle: show-once

- id: tip_diff
  message: "Tip: Use /diff to review uncommitted changes. Optionally specify a target like /diff main."
  lifecycle: show-once

- id: tip_reviewer
  message: "Tip: Use /reviewer to have your current agent review and critique your changes before committing. Add a focus area like /reviewer security."
  lifecycle: show-once

- id: tip_plan_swarm
  message: "Tip: Use /plan-swarm then describe your task. Three perspective agents (conservative, balanced, creative) will research, debate, and propose plans for you to choose from."
  lifecycle: show-once

- id: tip_rewind
  message: "Tip: Use /rewind to undo file changes — Claude auto-checkpoints files as you work. Pick a snapshot to roll back to."
  lifecycle: show-once

- id: tip_shell_interactive
  message: "Tip: Use /shell <cmd> to run commands inline, or /shell -i <cmd> for interactive tools. Common tools like vim, htop, psql are auto-detected. Shortcut: !ls."
  lifecycle: show-once

- id: tip_clearui
  message: "Tip: Use /clearui to clean up the UI without losing conversation history. /clear resets everything."
  lifecycle: show-once

- id: tip_workflow_reload
  message: "Tip: Use /workflow reload to pick up manifest changes without restarting your session."
  lifecycle: show-once
