[tool.ruff]
target-version = "py310"
exclude = [".pixi"]
extend-exclude = ["*.jinja"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]  # line-length handled by ruff format
# E=pycodestyle, F=pyflakes, I=isort, UP=pyupgrade, B=bugbear, SIM=simplify

[tool.ruff.lint.per-file-ignores]

[tool.pyright]
pythonVersion = "3.10"
include = [
    "tests/test_mcp_integration.py",
    "tests/test_mcp_discovery.py",
    "tests/test_onboarding.py",
    "tests/test_tui_chatapp.py",
    "tests/test_e2e_cross_platform.py",
    "tests/test_windows_crash_fixes.py",
    "tests/conftest.py",
    "scripts",
]
exclude = ["build", ".pixi", "template", "submodules"]
extraPaths = ["submodules/claudechic"]

[tool.pytest.ini_options]
pythonpath = [".", "scripts"]
testpaths = ["tests", "submodules/claudechic/tests"]
markers = [
    "slow: tests that take >30s (copier+pixi install, E2E, pexpect)",
    "integration: tests requiring external tools (copier, pixi) but <60s each",
    "copier: tests that run copier copy",
    "pixi: tests that require pixi installed",
    "network: tests requiring network access",
    "tui: Textual TUI tests using App.run_test()",
    "unix_only: tests that only work on Linux/macOS (pexpect)",
    "e2e: full end-to-end lifecycle tests",
]
strict_markers = true
# Default: skip slow AND integration tests locally — fast suite only
addopts = "-n auto --dist loadscope -m 'not slow and not integration'"
timeout = 30
filterwarnings = [
    "ignore::copier._vcs.DirtyLocalWarning",
]
