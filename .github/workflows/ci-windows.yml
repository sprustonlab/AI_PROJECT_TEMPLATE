# =============================================================================
# CI Workflow - Windows E2E Tests
# =============================================================================
# Runs end-to-end tests on Windows using both PowerShell 5.1 and 7.x.
#
# Tests:
#   1. test_activate.ps1 - Verifies SLCenv bootstrap and environment activation
#   2. test_claudechic.ps1 - Verifies claudechic command (conda environment install + launch)
#   3. test_skill_available.ps1 - Verifies /ao_project_team skill is available
#
# Platform notes:
#   - PowerShell 5.1 (shell: powershell) = Windows PowerShell, ships with Win10/11
#   - PowerShell 7.x (shell: pwsh) = PowerShell Core, cross-platform
#   - Both must pass. PS 5.1 is stricter (encoding, Join-Path, string parsing).
# =============================================================================

name: CI Windows

on:
  push:
    branches: [main, master, windows]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  test-windows:
    name: E2E Tests (Windows, ${{ matrix.shell }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        shell: [powershell, pwsh]  # PowerShell 5.1 and PowerShell 7.x

    env:
      # Force UTF-8 encoding for Python to handle emoji characters
      PYTHONIOENCODING: utf-8

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Critical: Initializes the claudechic submodule
          fetch-depth: 0         # Full history for submodule checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # Test 1: . .\activate.ps1
      # -----------------------------------------------------------------------
      - name: Test 1 - Activate Script
        run: |
          Write-Host "Running test_activate.ps1..."
          . .\tests\ci\test_activate.ps1

      # -----------------------------------------------------------------------
      # Test 2: claudechic command (E2E — conda environment install + launch)
      # Note: Tests claudechic command --help, not full TUI (headless CI)
      # -----------------------------------------------------------------------
      - name: Test 2 - Claudechic
        run: |
          Write-Host "Running test_claudechic.ps1..."
          . .\tests\ci\test_claudechic.ps1
        timeout-minutes: 15  # Environment installation can take time

      # -----------------------------------------------------------------------
      # Test 3: /ao_project_team skill
      # -----------------------------------------------------------------------
      - name: Test 3 - Skill Available
        run: |
          Write-Host "Running test_skill_available.ps1..."
          . .\tests\ci\test_skill_available.ps1

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Test Summary
        if: always()
        run: |
          Write-Host ""
          Write-Host "Windows CI Tests completed (${{ matrix.shell }})"
