[workspace]
name = "my-project"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

# ── Base (always present — claudechic is the foundation) ──────
[dependencies]
python = ">=3.10"
pip = "*"
pytest = ">=9.0.2,<10"

[pypi-dependencies]
claudechic = { path = "submodules/claudechic", editable = true }

# ── Optional environments (added by user or Copier) ───────────
[feature.jupyter.dependencies]
python = ">=3.10"
jupyterlab = "*"

# ── Pixi tasks ───────────────────────────────────────────────
[tasks]
claudechic = "claudechic"
generate-hooks = "python3 .claude/guardrails/generate_hooks.py"

[feature.jupyter.tasks]
jupyter = "jupyter lab"

# ── Environment mappings ──────────────────────────────────────
# Default env has claudechic (base). Named envs add optional features.
[environments]
jupyter = ["jupyter"]
