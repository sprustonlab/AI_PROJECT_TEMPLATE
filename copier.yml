_min_copier_version: "9.0.0"
_subdirectory: "template"
_templates_suffix: ".jinja"

project_name:
  type: str
  help: "Your project name (used for directory name and env naming)"
  validator: "{% if not project_name %}Project name is required{% endif %}"

quick_start:
  type: str
  help: |
    How much starter content should your project include?

    Your project always ships with the full infrastructure: workflows
    (phase-gated processes with guardrails) and the Project Team
    (multi-agent collaboration). This choice controls how many
    EXAMPLES are pre-loaded.
  choices:
    "Give me everything -- learning mode": everything
    "Reasonable defaults -- first project": defaults
    "Start empty -- experienced user": empty
    "Ask me about each -- granular": custom
  default: "defaults"

example_rules:
  type: bool
  default: true
  when: "{{ quick_start == 'custom' }}"
  help: |
    Include example guardrail rules?
    Rules control what Claude Code can do: block dangerous commands,
    enforce package management (pixi over pip), protect config files.

example_agent_roles:
  type: bool
  default: true
  when: "{{ quick_start == 'custom' }}"
  help: |
    Include specialist agent roles beyond the core team?
    Adds Researcher, LabNotebook, UIDesigner, and other specialist
    roles. Core roles (Coordinator, Implementer, Skeptic, etc.)
    are always included.

example_workflows:
  type: bool
  default: true
  when: "{{ quick_start == 'custom' }}"
  help: |
    Include tutorial workflows?
    Two guided walkthroughs: "Extending the System" and "Toy Project"
    (build labmeta with the full agent team). The core project_team
    workflow is always included.

example_hints:
  type: bool
  default: true
  when: "{{ quick_start == 'custom' }}"
  help: |
    Include global hints (toast notifications)?
    Welcome message and workflow tips shown on startup.

example_patterns:
  type: bool
  default: false
  when: "{{ quick_start == 'custom' }}"
  help: |
    Include the pattern miner?
    Analyzes Claude Code session history for recurring corrections.

target_platform:
  type: str
  choices:
    "Auto-detect (current OS only)": auto
    "Linux": linux-64
    "macOS (Apple Silicon)": osx-arm64
    "Windows": win-64
    "All platforms (slower solves)": all
  default: "auto"
  help: "Which platform(s) to solve dependencies for? Auto-detect is fastest."

claudechic_mode:
  type: str
  choices:
    "Standard -- installs from git, updates via pixi update (recommended)": standard
    "Developer -- clones locally for hacking on claudechic itself": developer
  default: "standard"
  help: |
    Standard mode: claudechic installed from git URL. You get updates with `pixi update`.
    Developer mode: claudechic cloned into submodules/claudechic/ for local editing.
    You can switch between modes later (see project docs).

use_cluster:
  type: bool
  default: false
  help: "Enable cluster job management (submit, monitor, kill jobs)?"

init_git:
  type: bool
  default: true
  help: "Set up git for this project? A setup workflow will handle init, remote, and first push."

use_existing_codebase:
  type: bool
  default: false
  help: |
    Do you have an existing codebase to integrate?
    A setup workflow will help you integrate it after startup.

_exclude:
  # Always excluded (repo infrastructure, not project content)
  - docs/
  - .project_team/
  - submodules/
  - tests/
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"
  - "**/*.pyc"

  # claudechic developer rules (reference submodules/ paths only available in developer mode)
  - "{% if claudechic_mode == 'standard' %}.claude/rules/{% endif %}"

  # Cluster: hardware capability toggle (not example content)
  - "{% if not use_cluster %}mcp_tools/_cluster.py{% endif %}"
  - "{% if not use_cluster %}mcp_tools/cluster_dispatch.py{% endif %}"
  - "{% if not use_cluster %}mcp_tools/_lsf.py{% endif %}"
  - "{% if not use_cluster %}mcp_tools/_slurm.py{% endif %}"
  - "{% if not use_cluster %}mcp_tools/cluster.yaml{% endif %}"

  # Example content: controlled by quick_start preset or custom sub-questions
  # Helper: _inc_rules, _inc_roles, _inc_workflows, _inc_patterns
  # "everything" = all true; "defaults" = rules+roles; "empty" = all false; "custom" = per-question

  # Example guardrail rules (global/rules.yaml with starter rules)
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_rules) %}global/rules.yaml{% endif %}"

  # Global hints (global/hints.yaml with welcome + tips)
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_hints) %}global/hints.yaml{% endif %}"

  # Tutorial workflows (project_team workflow always ships)
  - "{% if quick_start in ['empty', 'defaults'] or (quick_start == 'custom' and not example_workflows) %}workflows/tutorial_extending/{% endif %}"
  - "{% if quick_start in ['empty', 'defaults'] or (quick_start == 'custom' and not example_workflows) %}workflows/tutorial_toy_project/{% endif %}"

  # Specialist agent roles (core 7 always ship; specialists are examples)
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/researcher/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/lab_notebook/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/ui_designer/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/binary_portability/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/memory_layout/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/project_integrator/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_agent_roles) %}workflows/project_team/sync_coordinator/{% endif %}"

  # Audit workflow (replaces mine_patterns.py)
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_patterns) %}scripts/audit/{% endif %}"
  - "{% if quick_start == 'empty' or (quick_start == 'custom' and not example_patterns) %}workflows/audit/{% endif %}"

_tasks:
  # Post-generation: make scripts executable
  - "{% if _copier_conf.os != 'windows' %}chmod +x activate scripts/*.py 2>/dev/null || true{% endif %}"
  # Post-generation: clone claudechic for developer mode
  - "{% if claudechic_mode == 'developer' %}git clone https://github.com/sprustonlab/claudechic submodules/claudechic{% endif %}"

_message_after_copy: |
  Project generated! Next steps:

  {% if _copier_conf.os == 'windows' %}
  # Windows — if scripts are blocked, run this first:
  Set-ExecutionPolicy -Scope CurrentUser -ExecutionPolicy RemoteSigned
  . .\activate.ps1
  {% else %}
  source ./activate
  {% endif %}
